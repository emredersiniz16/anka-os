name: Phoenix Core & Windows Agent Builder

on:
  workflow_dispatch: 
  push:
    branches: [ "main" ]

jobs:
  build_rom:
    name: 📱 Anka OS Çekirdeği (Android ZIP)
    runs-on: ubuntu-latest

    steps:
    - name: Depoyu Çek
      uses: actions/checkout@v4

    - name: ARM Derleyicisini Kur
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-arm-linux-gnueabi zip

    - name: Anka OS Çekirdeğini Derle
      run: |
        # DÜZELTME: Tüm C dosyalarını derleyip tek binary haline getiriyoruz.
        # -I./core ile header dosyaları (hardware_types.h dahil) doğru şekilde bulunur.
        arm-linux-gnueabi-gcc -static -Os -I./core core/*.c -o anka_os.bin

    - name: Kendi Açık Kaynak Kurulum Motorumuzu Hazırla
      run: |
        mkdir -p Anka_ROM/META-INF/com/google/android
        mkdir -p Anka_ROM/system/bin
        cp anka_os.bin Anka_ROM/system/bin/anka_os
        
        # --- GÜVENLİ KURULUM MOTORU ---
        cat << 'EOF' > Anka_ROM/META-INF/com/google/android/update-binary
        #!/sbin/sh
        OUTFD=$2
        ui_print() { echo -n -e "ui_print $1\n" > /proc/self/fd/$OUTFD; }
        
        ui_print "--- ANKA OS: SİNEK KERNEL HAZIRLANIYOR ---"
        mount /system || mount -o rw /dev/block/bootdevice/by-name/system /system
        
        if [ $? -eq 0 ]; then
            ui_print "Enjeksiyon basliyor..."
            chmod 0755 /system/bin/anka_os
            sync
            umount /system
            ui_print "KURULUM TAMAMLANDI!"
        else
            ui_print "HATA: Sistem baglanamadi!"
            exit 1
        fi
        exit 0
        EOF
        
        chmod +x Anka_ROM/META-INF/com/google/android/update-binary
        # Anka_ROM klasörüne girip ZIP'i oluşturuyoruz
        cd Anka_ROM && zip -r ../Anka_OS_Kurulum.zip .

    - name: ROM Sistemini İndirmeye Sun
      uses: actions/upload-artifact@v4
      with:
        name: Anka_OS_TWRP_ROM
        path: Anka_OS_Kurulum.zip

  build_exe:
    name: 💻 Telefoncu Dükkanı Ajanı (Windows EXE)
    runs-on: windows-latest
    steps:
    - name: Kovanı İndir
      uses: actions/checkout@v4
    - name: Python Kurulumu
      uses: actions/setup-python@v4
      with: {python-version: '3.10'}
    - name: Ajanı EXE'ye Çevir
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pyinstaller --onefile --name Anka_Launcher agents/anka_launcher.py
    - name: Ajan Paketini Hazırla
      uses: actions/upload-artifact@v4
      with: {name: Anka_OS_Ajan_EXE, path: dist/Anka_Launcher.exe}
