name: Phoenix Core Builder

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Depoyu Çek
      uses: actions/checkout@v4

    - name: ARM Derleyicisini Kur
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-arm-linux-gnueabi zip

    - name: Anka OS Çekirdeğini Derle
      run: |
        arm-linux-gnueabi-gcc -static -Os core/boot.c -o anka_os.bin

    - name: Kurulum ZIP Paketini Hazırla (TWRP Uyumlu)
      run: |
        # Klasör iskeletini kur
        mkdir -p Anka_ROM/META-INF/com/google/android
        mkdir -p Anka_ROM/system/bin
        
        # Derlediğimiz Anka OS çekirdeğini ROM'un içine yerleştir
        cp anka_os.bin Anka_ROM/system/bin/anka_os
        
        # updater-script (Senin imzanı taşıyan açık kaynak manifestosu)
        cat << 'EOF' > Anka_ROM/META-INF/com/google/android/updater-script
        ui_print("=================================================");
        ui_print("             [ ANKA OS UYANIYOR... ]             ");
        ui_print("=================================================");
        ui_print("Gelistirici: Emre Burak");
        ui_print("Lisans: %100 Acik Kaynak (Open Source)");
        ui_print("Felsefe: Sifir Cihaz Yorgunlugu, Saf Performans.");
        ui_print("Hedef: Cekmecedeki Telefonlari YZ Canavarina Cevirmek.");
        ui_print("-------------------------------------------------");
        ui_print("[1/3] Android Zombi Dosyalari Temizleniyor...");
        format("ext4", "EMMC", "/dev/block/bootdevice/by-name/system", "0", "/system");
        ui_print("[2/3] Sinek Cekirdege Enjekte Ediliyor...");
        package_extract_dir("system", "/system");
        set_perm(0, 0, 0755, "/system/bin/anka_os");
        ui_print("[3/3] Donanim Dedektifi Baglantilari Kuruluyor...");
        ui_print("=================================================");
        ui_print("KURULUM TAMAMLANDI! CIHAZA YENI BIR RUH VERDIN.");
        EOF
        
        # update-binary (TWRP'nin motoru - Şimdilik dosya yapısını korumak için boş oluşturuyoruz)
        touch Anka_ROM/META-INF/com/google/android/update-binary
        chmod +x Anka_ROM/META-INF/com/google/android/update-binary
        
        # Hepsini tek bir flashlanabilir ZIP dosyasında paketle
        cd Anka_ROM
        zip -r ../Anka_OS_Kurulum.zip .
        cd ..

    - name: Sistemi İndirmeye Sun
      uses: actions/upload-artifact@v4
      with:
        name: Anka_OS_TWRP_ROM
        path: Anka_OS_Kurulum.zip
