# .github/workflows/kalp_atisi.yml
name: Anka Kalp Atışı

on:
  schedule:
    - cron: '0 * * * *' # Her saat başı çalışır
  workflow_dispatch: # Manuel tetikleme imkanı

jobs:
  sinek_uyanis:
    runs-on: ubuntu-latest
    
    steps:
    - name: Kovanı Çek
      uses: actions/checkout@v2
      
    - name: Python Ortamını Kur
      uses: actions/setup-python@v2
      with:
        python-version: '3.10' # Versiyonu sabitledik, daha kararlı olur
        
    - name: Sinek Avcı Modunu Tetikle
      env:
        PYTHONPATH: ${{ github.workspace }}
      run: |
        echo "🪰 Kraliçe Arı (GitHub) Sinek'i uyandırıyor..."
        # -m modül tetikleme yöntemi ile 'core' paketini tam tanıyacak
        python -m core.sinek_nexus --avci-modu
