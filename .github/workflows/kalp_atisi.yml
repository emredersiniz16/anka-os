# .github/workflows/kalp_atisi.yml
name: Anka Kalp Atışı

on:
  schedule:
    - cron: '*/15 * * * *' # Her 15 dakikada bir nabız yoklar (Sinek derin uykuya dalmasın diye)
  workflow_dispatch: # Manuel tetikleme imkanı

# Güvenlik izinleri (GitHub Best Practice)
permissions:
  contents: read

jobs:
  sinek_uyanis:
    runs-on: ubuntu-latest
    
    # KANKA EN ÖNEMLİ SATIR BU: Maksimum 5 dakika çalışmasına izin veriyoruz. 
    # İçeride sonsuz döngü kalsa bile 5. dakikada fişi temizce çeker, sunucuyu kitlemez.
    timeout-minutes: 5 
    
    steps:
    - name: Kovanı Çek
      uses: actions/checkout@v4 # Daha güncel checkout aksiyonu
      
    - name: Python Ortamını Kur
      uses: actions/setup-python@v5 # Daha güncel python aksiyonu
      with:
        python-version: '3.10'
        cache: 'pip' # Sistemi hızlandırmak için önbellek eklendi
        
    - name: Sinek Avcı Modunu Tetikle
      run: |
        echo "🪰 Kraliçe Arı (GitHub) Sinek'i uyandırıyor..."
        # Çalışma dizinini 'core' klasörüne taşıyoruz
        cd core
        # Artık dizin içerisindeki dosyalar birbirini doğrudan kardeş modül olarak görür
        python sinek_nexus.py --avci-modu
